name: Orbis v0.10 source upgrade

on:
  push:
    paths:
      - '.github/workflows/orbis-v010-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply v0.10 source changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/orbiswatchlab/MainActivity.java')
          text = path.read_text(encoding='utf-8')

          replacements = [
              ('private static final String APP_VERSION = "0.9";',
               'private static final String APP_VERSION = "0.10";'),
              ('private static final long PROTOCOL_GAP_MS = 1800;',
               'private static final long PROTOCOL_GAP_MS = 1800;\n    private static final long NORMAL_RESPONSE_WINDOW_MS = 3500;\n    private static final long LONG_RESPONSE_WINDOW_MS = 12000;'),
              ('private Button sendButton, repeatButton, sequenceButton, stopButton;',
               'private Button sendButton, df00Button, df0000Button, feLongButton, stopButton;'),
              ('private long sessionStartedAt, lastExplorerTxAt;',
               'private long sessionStartedAt, lastExplorerTxAt, pendingValidUntil;'),
              ('private String[] explorerCommands = new String[0];\n    private String explorerMode = "", activeCommand = "", baselineResponse = "";',
               'private String[] explorerCommands = new String[0];\n    private String explorerMode = "", activeCommand = "", previousCommand = "", baselineResponse = "";\n    private long explorerGapMs = PROTOCOL_GAP_MS, explorerResponseWindowMs = NORMAL_RESPONSE_WINDOW_MS;'),
              ('activeCommand = explorerCommands[explorerIndex++];\n            lastExplorerTxAt = System.currentTimeMillis();',
               'previousCommand = activeCommand;\n            activeCommand = explorerCommands[explorerIndex++];\n            lastExplorerTxAt = System.currentTimeMillis();\n            pendingValidUntil = lastExplorerTxAt + explorerResponseWindowMs;'),
              ('handler.postDelayed(this, PROTOCOL_GAP_MS);',
               'handler.postDelayed(this, explorerGapMs);'),
              ('if (explorerRunning && c.getUuid().equals(NUS_TX) && !activeCommand.isEmpty()) {',
               'if (c.getUuid().equals(NUS_TX) && !activeCommand.isEmpty() && System.currentTimeMillis() <= pendingValidUntil) {'),
              ('String comparison;\n                if (baselineResponse.isEmpty()) { baselineResponse = payload; comparison = "BASELINE"; }\n                else comparison = baselineResponse.equals(payload) ? "IGUAL_A_BASELINE" : "DIFERENTE_DA_BASELINE";',
               'String comparison;\n                if (baselineResponse.isEmpty()) { baselineResponse = payload; comparison = "BASELINE"; }\n                else comparison = baselineResponse.equals(payload) ? "IGUAL_A_BASELINE" : "DIFERENTE_DA_BASELINE";\n                String timingClass = latency <= NORMAL_RESPONSE_WINDOW_MS ? "IMEDIATA" : "TARDIA";'),
              ('appendLog("*** RESPOSTA TX=" + activeCommand + " RX=" + payload + " LATÊNCIA=" + latency + "ms " + comparison + " ***");',
               'appendLog("*** RESPOSTA TX=" + activeCommand + " ANTERIOR=" + previousCommand + " RX=" + payload + " LATÊNCIA=" + latency + "ms " + timingClass + " " + comparison + " ***");'),
              ('addEvent("PROTO_RX", channel, payload, "tx=" + activeCommand + ";latency_ms=" + latency + ";" + comparison);',
               'addEvent("PROTO_RX", channel, payload, "tx=" + activeCommand + ";previous=" + previousCommand + ";latency_ms=" + latency + ";class=" + timingClass + ";" + comparison);'),
              ('LinearLayout protocolRow = new LinearLayout(this); repeatButton = button("REPETIR FE01 ×5", v -> startRepeatFe01()); sequenceButton = button("SEQUÊNCIA DF/FE ×3", v -> startDfFeSequence()); protocolRow.addView(repeatButton, weight()); protocolRow.addView(sequenceButton, weight()); root.addView(protocolRow);\n        stopButton = button("PARAR EXPLORADOR", v -> stopExplorer("parada manual")); root.addView(stopButton);',
               'LinearLayout protocolRow1 = new LinearLayout(this); df00Button = button("DF00 ×5", v -> startDf00()); df0000Button = button("DF0000 ×5", v -> startDf0000()); protocolRow1.addView(df00Button, weight()); protocolRow1.addView(df0000Button, weight()); root.addView(protocolRow1);\n        LinearLayout protocolRow2 = new LinearLayout(this); feLongButton = button("FE01 LONGO ×5", v -> startFe01Long()); stopButton = button("PARAR", v -> stopExplorer("parada manual")); protocolRow2.addView(feLongButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 2)); protocolRow2.addView(stopButton, weight()); root.addView(protocolRow2);'),
              ('private void startRepeatFe01() { startExplorer("REPETIÇÃO FE01", new String[]{"FE 01", "FE 01", "FE 01", "FE 01", "FE 01"}); }\n\n    private void startDfFeSequence() {\n        startExplorer("SEQUÊNCIA DF/FE ×3", new String[]{\n                "DF 00", "DF 00 00", "FE 01",\n                "DF 00", "DF 00 00", "FE 01",\n                "DF 00", "DF 00 00", "FE 01"\n        });\n    }',
               'private void startDf00() { startExplorer("DF00 ×5", new String[]{"DF 00", "DF 00", "DF 00", "DF 00", "DF 00"}, PROTOCOL_GAP_MS, NORMAL_RESPONSE_WINDOW_MS); }\n\n    private void startDf0000() { startExplorer("DF0000 ×5", new String[]{"DF 00 00", "DF 00 00", "DF 00 00", "DF 00 00", "DF 00 00"}, PROTOCOL_GAP_MS, NORMAL_RESPONSE_WINDOW_MS); }\n\n    private void startFe01Long() { startExplorer("FE01 LONGO ×5", new String[]{"FE 01", "FE 01", "FE 01", "FE 01", "FE 01"}, LONG_RESPONSE_WINDOW_MS, LONG_RESPONSE_WINDOW_MS); }'),
              ('private void startExplorer(String mode, String[] commands) {',
               'private void startExplorer(String mode, String[] commands) { startExplorer(mode, commands, PROTOCOL_GAP_MS, NORMAL_RESPONSE_WINDOW_MS); }\n\n    private void startExplorer(String mode, String[] commands, long gapMs, long responseWindowMs) {'),
              ('stopExplorer("reinício"); explorerRunning = true; explorerMode = mode; explorerCommands = commands; explorerIndex = 0; explorerSentCount = 0; explorerHitCount = 0; activeCommand = ""; baselineResponse = ""; protocolResponses.clear();',
               'stopExplorer("reinício"); explorerRunning = true; explorerMode = mode; explorerCommands = commands; explorerGapMs = gapMs; explorerResponseWindowMs = responseWindowMs; explorerIndex = 0; explorerSentCount = 0; explorerHitCount = 0; activeCommand = ""; previousCommand = ""; baselineResponse = ""; pendingValidUntil = 0; protocolResponses.clear();'),
              ('appendLog("Canal NUS-RX em WRITE_NO_RESPONSE; intervalo " + PROTOCOL_GAP_MS + " ms; FFF1/FF13/FF02/OTA/reset excluídos");',
               'appendLog("Canal NUS-RX em WRITE_NO_RESPONSE; intervalo " + explorerGapMs + " ms; janela RX " + explorerResponseWindowMs + " ms; FFF1/FF13/FF02/OTA/reset excluídos");'),
              ('if (repeatButton != null) repeatButton.setEnabled(ready && findNusRx() != null && !explorerRunning); if (sequenceButton != null) sequenceButton.setEnabled(ready && findNusRx() != null && !explorerRunning);',
               'if (df00Button != null) df00Button.setEnabled(ready && findNusRx() != null && !explorerRunning); if (df0000Button != null) df0000Button.setEnabled(ready && findNusRx() != null && !explorerRunning); if (feLongButton != null) feLongButton.setEnabled(ready && findNusRx() != null && !explorerRunning);')
          ]

          missing = []
          for old, new in replacements:
              if old not in text:
                  missing.append(old.splitlines()[0][:120])
              else:
                  text = text.replace(old, new)

          if missing:
              raise SystemExit('Trechos não encontrados: ' + ' | '.join(missing))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit v0.10
        shell: bash
        run: |
          git config user.name "Orbis Builder"
          git config user.email "actions@users.noreply.github.com"
          git add app/src/main/java/com/orbiswatchlab/MainActivity.java
          git commit -m "Orbis Watch Lab v0.10 isolated protocol timing tests"
          git push
